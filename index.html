<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guo的小问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "微软雅黑",sans-serif;
            background: #000;
            color: #eee;
            background-image: radial-gradient(rgba(212,175,55,0.03) 1px,transparent 1px);
            background-size: 30px 30px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        header {
            text-align: center;
            padding: 30px 20px;
            background: #0d0d14;
            border-radius: 16px;
            border: 1px solid rgba(212,175,55,0.15);
            margin-bottom: 25px;
        }
        h1 {
            background: linear-gradient(90deg,#c8a440,#ffe699);
            -webkit-background-clip: text;
            color: transparent;
            font-size: 32px;
            margin-bottom: 10px;
        }
        header p {
            color: #a2a2b5;
        }
        .test-info {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #0a0a10;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .timer {
            color: #ff7070;
            font-weight: 500;
        }
        .type-tag {
            color: #d4af37;
            margin-left: 15px;
        }
        .progress-bar {
            width: 100%;
            height: 14px;
            background: #08080d;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg,#b08828,#e6c260);
            width: 0%;
            transition: 0.3s;
        }
        #question-container {
            background: #0d0d14;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(212,175,55,0.15);
            min-height: 280px;
            position: relative;
            margin-bottom: 25px;
        }
        .question-img-box {
            position: absolute;
            right: 20px;
            top: 20px;
            max-width: 170px;
        }
        .question-img-box img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(212,175,55,0.2);
        }
        .question-number {
            font-size: 20px;
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 17px;
            line-height: 1.8;
            padding-right: 190px;
            margin-bottom: 25px;
            color: #f0f0f8;
        }
        .option {
            padding: 14px 18px;
            background: #08080d;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid rgba(212,175,55,0.08);
            cursor: pointer;
        }
        .option:hover {
            border-color: rgba(212,175,55,0.3);
        }
        .option input {
            margin-right: 12px;
            accent-color: #d4af37;
        }
        .fill-input {
            width: 100%;
            padding: 14px;
            background: #08080d;
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .btn {
            padding: 12px 25px;
            background: linear-gradient(135deg,#8c6d20,#d4af37);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
            font-size: 15px;
        }
        .btn:hover {
            box-shadow: 0 0 8px rgba(212,175,55,0.3);
        }
        .btn:disabled {
            background: #222;
            color: #666;
            cursor: not-allowed;
        }
        .result-container {
            background: #0d0d14;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(212,175,55,0.15);
        }
        .score {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(90deg,#d4af37,#ffe89c);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .analysis-item {
            padding: 18px;
            background: #08080d;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .analysis-q {
            color: #e6c870;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .analysis-right {
            color: #79dd6f;
            margin-bottom: 6px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Guo的小问答</h1>
        <p>考考你关于果果的小知识</p>
    </header>
    <div class="test-info">
        <div class="timer">剩余时间：<span id="timer">30:00</span></div>
        <div>
            <span class="type-tag" id="qType">题型：</span>
            <span>进度：<span id="progressText">0/20</span></span>
        </div>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
    </div>
    <div id="questionBox">正在加载题库...</div>
    <div style="margin:20px 0;">
        <button class="btn" id="prevBtn">上一题</button>
        <button class="btn" id="nextBtn">下一题</button>
        <button class="btn" id="submitBtn">交卷评分</button>
    </div>
    <div id="resultBox" class="hidden">
        <div class="score">本次得分：<span id="userScore">0</span> / 20</div>
        <div id="answerAnalyze"></div>
    </div>
</div>

<script>
// 全局配置
const ALL_COUNT = 20;
const MUST_SINGLE = 10; // 强制固定10道单选
let allQuestion = [];
let examList = [];
let nowIdx = 0;
let userAnswer = [];
let timeLeft = 30 * 60;
let timerRun = null;

// 读取本地题库tk.json
fetch("tk.json")
.then(res=>res.json())
.then(data=>{
    allQuestion = data;
    makeExamPaper();
})
.catch(()=>{
    document.getElementById("questionBox").innerHTML = `<div style="text-align:center;color:#f66;padding:60px 0">请将题库 tk.json 和网页放在同一目录</div>`;
})

// 组卷核心：强制10单选 + 剩余10题自由混合
function makeExamPaper(){
    // 筛选纯单选题
    let singlePool = allQuestion.filter(item=>{
        return !Array.isArray(item.answer);
    });
    // 剩余所有题型池：单选/多选/填空
    let mixPool = [...allQuestion];

    // 打乱题库
    function shuffle(arr){
        let a = [...arr];
        for(let i=a.length-1;i>0;i--){
            let r = Math.floor(Math.random()*(i+1));
            [a[i],a[r]] = [a[r],a[i]];
        }
        return a;
    }

    singlePool = shuffle(singlePool);
    mixPool = shuffle(mixPool);

    // 先选出固定10道单选
    let fixedSingle = singlePool.slice(0,MUST_SINGLE);
    // 再从混合池抽剩下10题（任意题型）
    let freeList = mixPool.slice(0, ALL_COUNT - MUST_SINGLE);

    // 合并整套20题试卷
    examList = shuffle([...fixedSingle,...freeList]);
    userAnswer = new Array(ALL_COUNT).fill(null);

    nowIdx = 0;
    showQues(nowIdx);
    startTimer();
}

// 判断题型
function getTypeStr(q){
    if(!q.options) return "文本填空题";
    if(Array.isArray(q.answer)) return "多项选择题";
    return "单项选择题";
}

// 渲染题目
function showQues(idx){
    let q = examList[idx];
    let box = document.getElementById("questionBox");
    document.getElementById("qType").innerText = "题型："+getTypeStr(q);
    document.getElementById("progressText").innerText = `${idx+1}/${ALL_COUNT}`;
    document.getElementById("progressBar").style.width = ((idx+1)/ALL_COUNT*100)+"%";

    let imgDom = q.file ? `<div class="question-img-box"><img src="${q.file}"></div>` : "";
    let html = `${imgDom}
    <div class="question-number">第${idx+1}题</div>
    <div class="question-text">${q.text}</div>`;

    // 文本填空
    if(!q.options){
        let val = userAnswer[idx]||"";
        html += `<input class="fill-input" id="fillInput" placeholder="在此输入答案" value="${val}">`;
    }
    // 选择题
    else{
        html += `<div class="optionsBox">`;
        q.options.forEach((opt,i)=>{
            let name = Array.isArray(q.answer) ? "mulAns" : "singleAns";
            let checked = false;
            if(userAnswer[idx] !== null){
                if(!Array.isArray(q.answer) && userAnswer[idx] === opt) checked=true;
                if(Array.isArray(q.answer) && userAnswer[idx]?.includes(opt)) checked=true;
            }
            let inpType = Array.isArray(q.answer) ? "checkbox" : "radio";
            html += `
            <div class="option">
                <input type="${inpType}" name="${name}" value="${opt}" ${checked?"checked":""}>${opt}
            </div>`;
        })
        html += `</div>`;
    }
    box.innerHTML = html;
}

// 保存当前答案
function saveNowAns(){
    let q = examList[nowIdx];
    if(!q.options){
        let txt = document.getElementById("fillInput").value.trim();
        userAnswer[nowIdx] = txt;
    }else if(Array.isArray(q.answer)){
        let selects = [];
        document.querySelectorAll('input[name="mulAns"]:checked').forEach(el=>{
            selects.push(el.value);
        })
        userAnswer[nowIdx] = selects;
    }else{
        let sel = document.querySelector('input[name="singleAns"]:checked');
        userAnswer[nowIdx] = sel ? sel.value : null;
    }
}

// 上一题
document.getElementById("prevBtn").onclick = function(){
    saveNowAns();
    if(nowIdx>0){
        nowIdx--;
        showQues(nowIdx);
    }
}
// 下一题
document.getElementById("nextBtn").onclick = function(){
    saveNowAns();
    if(nowIdx<ALL_COUNT-1){
        nowIdx++;
        showQues(nowIdx);
    }
}

// 交卷评分
document.getElementById("submitBtn").onclick = function(){
    saveNowAns();
    clearInterval(timerRun);
    let score = 0;
    let analyzeHtml = "";
    for(let i=0;i<examList.length;i++){
        let q = examList[i];
        let uAns = userAnswer[i];
        let right = false;

        // 单选判断
        if(!Array.isArray(q.answer) && q.options){
            if(uAns === q.answer) right=true;
        }
        // 多选判断
        else if(Array.isArray(q.answer)){
            if(Array.isArray(uAns) && uAns.length===q.answer.length){
                let same = q.answer.every(v=>uAns.includes(v));
                if(same) right=true;
            }
        }
        // 填空判断（包含匹配）
        else if(!q.options){
            if(q.answer.includes(uAns)) right=true;
        }

        if(right) score++;

        analyzeHtml += `
        <div class="analysis-item">
            <div class="analysis-q">第${i+1}题：${q.text}</div>
            <div class="analysis-right">正确答案：${Array.isArray(q.answer)?q.answer.join("、"):q.answer}</div>
            <div style="color:#ccc;font-size:14px">解析：${q.explanation}</div>
        </div>`;
    }
    document.getElementById("userScore").innerText = score;
    document.getElementById("answerAnalyze").innerHTML = analyzeHtml;
    document.getElementById("resultBox").classList.remove("hidden");
}

// 倒计时
function startTimer(){
    timerRun = setInterval(()=>{
        timeLeft--;
        let m = Math.floor(timeLeft/60);
        let s = timeLeft%60;
        document.getElementById("timer").innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(timeLeft<=0) clearInterval(timerRun);
    },1000)
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guo的小问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #e4e4e4;
            background-image: radial-gradient(rgba(212, 175, 55, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 28px;
            padding: 32px 20px;
            background: #0d0d14;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.12);
        }
        h1 {
            background: linear-gradient(90deg, #c8a440, #ffe699, #c8a440);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 32px;
        }
        header p {
            color: #a2a2b5;
            font-size: 15px;
        }
        .test-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            padding: 16px 22px;
            background: #0a0a10;
            border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .timer {
            font-weight: 500;
            color: #ff7070;
        }
        .type-tag{
            color:#d4af37;
            margin-left:15px;
        }
        .progress-bar {
            width: 100%;
            height: 16px;
            background: #08080d;
            border-radius: 999px;
            margin-bottom: 26px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.12);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #b08828, #e6c260);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 999px;
        }
        #question-container {
            background: #0d0d14;
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid rgba(212, 175, 55, 0.12);
            min-height: 260px;
            position: relative;
        }
        .question-img-box {
            position: absolute;
            right: 20px;
            top: 20px;
            max-width: 180px;
        }
        .question-img-box img {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .question-number {
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 18px;
            font-size: 20px;
        }
        .question-text {
            margin-bottom: 24px;
            font-size: 17px;
            line-height: 1.8;
            color: #f0f0f8;
            padding-right: 200px;
        }
        .option {
            margin-bottom: 16px;
            cursor: pointer;
            padding: 16px 20px;
            border-radius: 10px;
            background: #08080d;
            border: 1px solid rgba(212, 175, 55, 0.06);
        }
        .option:hover {
            border-color: rgba(212, 175, 55, 0.3);
        }
        .option input {
            margin-right: 14px;
            accent-color: #d4af37;
        }
        .fill-input{
            width:100%;
            padding:15px;
            background:#08080d;
            border:1px solid rgba(212,175,55,0.2);
            border-radius:10px;
            color:#fff;
            font-size:16px;
            outline:none;
        }
        .button-container {
            margin-bottom: 30px;
        }
        .btn {
            background: linear-gradient(135deg, #8c6d20, #d4af37);
            color: #000;
            font-weight: 600;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 14px;
        }
        .btn:hover {
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .btn:disabled {
            background: #1a1a24;
            color: #666;
            cursor: not-allowed;
        }
        .result-container {
            background: #0d0d14;
            border-radius: 16px;
            padding: 32px;
            border: 1px solid rgba(212, 175, 55, 0.12);
        }
        .score {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(90deg, #d4af37, #ffe89c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 24px;
        }
        .analysis-item {
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 10px;
            background: #08080d;
        }
        .analysis-question {
            font-weight: bold;
            margin-bottom: 12px;
            color: #e6c870;
        }
        .analysis-answer {
            margin-bottom: 10px;
            color: #79dd6f;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Guo的小问答</h1>
        <p>考验你关于果果的小知识</p>
    </header>

    <div class="test-info">
        <div class="timer">剩余时间: <span id="timer">30:00</span></div>
        <div>
            <span class="type-tag" id="qType">题型：</span>
            <span class="progress-text">进度: <span id="progress-text">0/20</span></span>
        </div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div id="question-container">请放入外部题库文件使用</div>

    <div class="button-container">
        <button class="btn" id="prev-btn">上一题</button>
        <button class="btn" id="next-btn">下一题</button>
        <button class="btn" id="submit-btn">提交测试</button>
    </div>

    <div id="result-container" class="hidden">
        <div class="score">测试得分: <span id="score">0</span>/20</div>
        <div class="analysis-container" id="analysis-container"></div>
    </div>
</div>

<script>
// 读取外部tk.json题库，无内置题目
const ALL_COUNT = 20;
const MUST_SINGLE = 10;
let allQuestion = [];
let examList = [];
let nowIdx = 0;
let userAnswer = [];
let timeLeft = 30 * 60;
let timerRun = null;
let usedIndex = [];

function shuffle(arr){
    let a = [...arr];
    for(let i=a.length-1;i>0;i--){
        let r = Math.floor(Math.random()*(i+1));
        [a[i],a[r]] = [a[r],a[i]];
    }
    return a;
}

// 读取外部题库
fetch("tk.json")
.then(res=>res.json())
.then(data=>{
    allQuestion = data;
    makeExamPaper();
})
.catch(()=>{
    document.getElementById("question-container").innerText = "未读取到tk.json题库文件，请放置同目录";
})

// 组卷 10固定单选+10自由题型 去重不重复出题
function makeExamPaper(){
    usedIndex = [];
    let singlePool = allQuestion.filter((item,idx)=>{
        if(!Array.isArray(item.answer) && !usedIndex.includes(idx)){
            usedIndex.push(idx);
            return true;
        }
        return false;
    });
    let mixPool = allQuestion.filter((item,idx)=>!usedIndex.includes(idx));

    singlePool = shuffle(singlePool);
    mixPool = shuffle(mixPool);

    let fixedSingle = singlePool.slice(0,MUST_SINGLE);
    let freeList = mixPool.slice(0, ALL_COUNT - MUST_SINGLE);
    examList = shuffle([...fixedSingle,...freeList]);
    userAnswer = new Array(ALL_COUNT).fill(null);
    nowIdx = 0;
    showQues(nowIdx);
    startTimer();
}

function getTypeStr(q){
    if(!q.options) return "文本填空题";
    if(Array.isArray(q.answer)) return "多项选择题";
    return "单项选择题";
}

function showQues(idx){
    let q = examList[idx];
    let box = document.getElementById("question-container");
    document.getElementById("qType").innerText = "题型："+getTypeStr(q);
    document.getElementById("progress-text").innerText = `${idx+1}/${ALL_COUNT}`;
    document.getElementById("progress-fill").style.width = ((idx+1)/ALL_COUNT*100)+"%";
    let imgDom = q.file ? `<div class="question-img-box"><img src="${q.file}"></div>` : "";
    let html = `${imgDom}
    <div class="question-number">第${idx+1}题</div>
    <div class="question-text">${q.text}</div>`;
    if(!q.options){
        let val = userAnswer[idx]||"";
        html += `<input class="fill-input" id="fillInput" placeholder="在此输入答案" value="${val}">`;
    }else{
        html += `<div class="optionsBox">`;
        q.options.forEach((opt,i)=>{
            let name = Array.isArray(q.answer) ? "mulAns" : "singleAns";
            let checked = false;
            if(userAnswer[idx] !== null){
                if(!Array.isArray(q.answer) && userAnswer[idx] === opt) checked=true;
                if(Array.isArray(q.answer) && userAnswer[idx]?.includes(opt)) checked=true;
            }
            let inpType = Array.isArray(q.answer) ? "checkbox" : "radio";
            html += `
            <div class="option">
                <input type="${inpType}" name="${name}" value="${opt}" ${checked?"checked":""}>${opt}
            </div>`;
        })
        html += `</div>`;
    }
    box.innerHTML = html;
}

function saveNowAns(){
    let q = examList[nowIdx];
    if(!q.options){
        let txt = document.getElementById("fillInput").value.trim();
        userAnswer[nowIdx] = txt;
    }else if(Array.isArray(q.answer)){
        let selects = [];
        document.querySelectorAll('input[name="mulAns"]:checked').forEach(el=>{
            selects.push(el.value);
        })
        userAnswer[nowIdx] = selects;
    }else{
        let sel = document.querySelector('input[name="singleAns"]:checked');
        userAnswer[nowIdx] = sel ? sel.value : null;
    }
}

document.getElementById("prev-btn").onclick = function(){
    saveNowAns();
    if(nowIdx>0){
        nowIdx--;
        showQues(nowIdx);
    }
}
document.getElementById("next-btn").onclick = function(){
    saveNowAns();
    if(nowIdx<ALL_COUNT-1){
        nowIdx++;
        showQues(nowIdx);
    }
}

document.getElementById("submit-btn").onclick = function(){
    saveNowAns();
    clearInterval(timerRun);
    let score = 0;
    let analyzeHtml = "";
    for(let i=0;i<examList.length;i++){
        let q = examList[i];
        let uAns = userAnswer[i];
        let right = false;
        if(!Array.isArray(q.answer) && q.options){
            if(uAns === q.answer) right=true;
        }else if(Array.isArray(q.answer)){
            if(Array.isArray(uAns) && uAns.length===q.answer.length){
                let same = q.answer.every(v=>uAns.includes(v));
                if(same) right=true;
            }
        }else if(!q.options){
            if(q.answer.includes(uAns)) right=true;
        }
        if(right) score++;
        analyzeHtml += `
        <div class="analysis-item">
            <div class="analysis-question">第${i+1}题：${q.text}</div>
            <div class="analysis-answer">正确答案：${Array.isArray(q.answer)?q.answer.join("、"):q.answer}</div>
            <div style="color:#ccc;font-size:14px">解析：${q.explanation}</div>
        </div>`;
    }
    document.getElementById("score").innerText = score;
    document.getElementById("analysis-container").innerHTML = analyzeHtml;
    document.getElementById("result-container").classList.remove("hidden");
}

function startTimer(){
    timerRun = setInterval(()=>{
        timeLeft--;
        let m = Math.floor(timeLeft/60);
        let s = timeLeft%60;
        document.getElementById("timer").innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(timeLeft<=0) clearInterval(timerRun);
    },1000)
}
</script>
</body>
</html>
